<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantastech Install Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F0F4F8;color:#2D3748}
.header{background:#1A365D;color:white;padding:20px 32px}
.header h1{font-size:22px}.header p{font-size:13px;color:#A0AEC0;margin-top:4px}
.summary{background:white;border-bottom:1px solid #E2E8F0;padding:16px 32px;display:flex;gap:24px}
.summary-card{text-align:center;min-width:80px}
.summary-card .num{font-size:28px;font-weight:bold;color:#2B6CB0}
.summary-card.scheduled .num{color:#D97706}
.summary-card.completed .num{color:#38A169}
.summary-card .lbl{font-size:11px;color:#718096;text-transform:uppercase}
.main{padding:24px 32px;max-width:1000px;margin:0 auto}
.order-card{background:white;border-radius:6px;padding:16px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #3182CE}
.order-card.overdue{border-left-color:#E53E3E}.order-card.today{border-left-color:#D97706}
.order-card.tomorrow{border-left-color:#ECC94B}.order-card.future{border-left-color:#3182CE}
.order-card.tbd{border-left-color:#A0AEC0}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-top-left{display:flex;flex-direction:column;gap:4px}
.order-num{font-size:12px;color:#2B6CB0;background:#EBF8FF;padding:2px 8px;border-radius:4px;font-weight:bold;display:inline-block}
.order-name{font-size:17px;font-weight:bold}
.badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:bold}
.badge-scheduled{background:#FFFBEB;color:#92400E;border:1px solid #FCD34D}
.badge-completed{background:#F0FFF4;color:#276749;border:1px solid #9AE6B4}
.archive-btn,.restore-btn{background:none;border:1px solid #CBD5E0;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px;color:#718096}
.schedule-banner{border-radius:4px;padding:8px 12px;margin:8px 0;font-size:13px}
.schedule-banner.future{background:#EBF8FF;color:#2B6CB0}
.schedule-banner.today{background:#FFFBEB;color:#92400E}
.schedule-banner.tomorrow{background:#FEFCE8;color:#713F12}
.schedule-banner.overdue{background:#FFF5F5;color:#742A2A}
.schedule-banner.tbd{background:#F7FAFC;color:#4A5568}
.sched-label{font-size:10px;text-transform:uppercase;font-weight:bold;opacity:.7}
.sched-date{font-size:14px;font-weight:bold}
.ship-to{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0}
.ship-to-block{min-width:200px}
.ship-to-label{font-size:10px;text-transform:uppercase;color:#A0AEC0;font-weight:bold}
.ship-to-name{font-weight:bold;font-size:14px}
.ship-to-address{font-size:13px;color:#4A5568}
.stops-list,.site-notes{background:#F7FAFC;border-radius:4px;padding:8px 12px;margin:6px 0;font-size:13px}
.stops-label,.site-notes-label{font-size:10px;text-transform:uppercase;font-weight:bold;color:#718096;margin-bottom:4px}
.stops-list ul,.site-notes ul{padding-left:16px}
.stops-list li,.site-notes li{margin:3px 0}
.site-notes li.warning{color:#92400E}
.site-notes li.preference{color:#1A365D}
.note-cat{font-weight:bold;margin-right:6px}
.crew-row{display:flex;gap:12px;margin-top:8px;font-size:13px}
.crew-label{font-size:10px;text-transform:uppercase;color:#A0AEC0;font-weight:bold}
.crew-val.tbd{color:#A0AEC0;font-style:italic}
.activity-toggle{cursor:pointer;font-size:12px;color:#3182CE;margin-top:8px;user-select:none}
.activity-log{display:none;margin-top:6px;font-size:12px;color:#4A5568}
.activity-log.open{display:block}
.tl-list{padding-left:16px}
.tl-date{font-weight:bold;margin-right:6px;color:#718096}
.archived{display:none}
footer{text-align:center;color:#A0AEC0;font-size:12px;padding:24px;border-top:1px solid #E2E8F0;margin-top:24px}
</style>
</head>
<body>
<div class="header">
  <h1>🔧 Fantastech Install Tracker</h1>
  <p>Fantastech Energy Solution LLC &mdash; Field Install Jobs</p>
</div>
<div class="summary">
  <div class="summary-card all"><div class="num" id="count-all">0</div><div class="lbl">Total</div></div>
  <div class="summary-card scheduled"><div class="num" id="count-scheduled">0</div><div class="lbl">Scheduled</div></div>
  <div class="summary-card completed"><div class="num" id="count-completed">0</div><div class="lbl">Completed</div></div>
</div>
<div class="main">
  <div class="orders" id="orders-container">
    <!-- Job cards inserted here by the install-tracker skill -->
  </div>
  <p id="empty-msg" style="color:#A0AEC0;font-style:italic;text-align:center;padding:40px">No active jobs. Add a job to get started.</p>
</div>
<footer>Fantastech Energy Solution LLC &mdash; derek@fantastech.org</footer>
<script>
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('archive-btn')) {
    e.target.closest('.order-card').classList.add('archived');
    updateCounts();
  }
  if (e.target.classList.contains('restore-btn')) {
    e.target.closest('.order-card').classList.remove('archived');
    updateCounts();
  }
});
function updateCounts() {
  var all = document.querySelectorAll('.order-card:not(.archived)');
  var sched = document.querySelectorAll('.order-card[data-status="scheduled"]:not(.archived)');
  var done = document.querySelectorAll('.order-card[data-status="completed"]:not(.archived)');
  document.getElementById('count-all').textContent = all.length;
  document.getElementById('count-scheduled').textContent = sched.length;
  document.getElementById('count-completed').textContent = done.length;
  document.getElementById('empty-msg').style.display = all.length ? 'none' : 'block';
}
updateCounts();
</script>
</body>
</html>
